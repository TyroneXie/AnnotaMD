packages:
  - 'packages/*'
  # muya v2 (TS) nests its dev surface and Playwright suite inside its own
  # package directory rather than as siblings under packages/, so list them
  # explicitly.
  - 'packages/muya/examples'
  - 'packages/muya/e2e'

# pnpm 11 reads workspace-wide overrides from pnpm-workspace.yaml rather than
# the legacy package.json "pnpm" field.
overrides:
  postcss: 8.5.15
  'esbuild@>=0.27.0 <0.28.1': 0.28.1

allowBuilds:
  ced: true
  electron-winstaller: true
  esbuild: true
  keytar: true
  native-keymap: true
  sharp: true
  unrs-resolver: true
  workerd: true
