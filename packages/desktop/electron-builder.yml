appId: com.github.tyronexie.annotamd
productName: AnnotaMD
directories:
  buildResources: build
  output: ../../dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  # ================================
  # Do not bundle these files
  # ================================
  - '!node_modules/dragula/resources'
  - '!node_modules/**/*.js.map'
  - '!node_modules/**/*.cjs.map'
  - '!node_modules/**/*.mjs.map'
  - '!node_modules/**/*.ts.map'
  - '!node_modules/@vscode/ripgrep/{jsconfig.json,*.md,LICENSE}'
  - '!node_modules/@vscode/ripgrep/lib/download.js'
  - '!node_modules/@vscode/ripgrep/lib/postinstall.js'
  - '!node_modules/ced/vendor'
  # Large source files
  - '!node_modules/mermaid/dist/mermaid.js'
  - '!node_modules/mermaid/dist/mermaid.min.js'
  - '!node_modules/mermaid/dist/mermaid.esm.min.mjs'
  - '!node_modules/katex/dist/katex.min.js'
  - '!node_modules/katex/dist/katex.mjs'
  # Don't bundle Linux build files
  - '!node_modules/ced/build/Release/compact_enc_det.a'
  - '!node_modules/**/{*.vcxproj,*.vcxproj.filters}'
  - '!node_modules/**/build/Release/{*.lib,*.exp,*.ilk,*.pdb,*.iobj,*.ipdb}'
  - '!node_modules/**/build/Release/obj'
  # Do not bundle development related files
  - '!eslint.config.js'
  - '!jsconfig.json'
  - '!docs/*'
extraResources:
  - from: ../../tools/annotamd-mcp/bundle
    to: annotamd-mcp
    filter:
      - 'index.mjs'
  - from: ../../tools/annotamd-mcp/skills/annotamd-comment-review
    to: annotamd-skills/annotamd-comment-review
    filter:
      - '**/*'
  - from: build/icons
    to: icons # ends up at resources/icons/
    filter:
      - '*.ico'
  - from: static
    to: static
    filter:
      - '**/*'
      - '!locales/**/!(*.min).json'
npmRebuild: false
electronLanguages: # Avoid packaging all chromium locales since our app has in-built locales
  - en-US

asarUnpack:
  - resources/**
fileAssociations:
  - ext: md
    name: Markdown
    description: Markdown document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: markdown
    name: Markdown
    description: Markdown document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mmd
    name: Markdown
    description: Markdown document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mdown
    name: Markdown
    description: Markdown document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mdtxt
    name: Markdown
    description: Markdown document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mdtext
    name: Markdown
    description: Markdown document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
win:
  executableName: annotamd
  artifactName: 'annotamd-win-${arch}-${version}.${ext}'
  target:
    - target: 'nsis'
    - target: 'zip'
  icon: static/icon.ico
nsis:
  artifactName: 'annotamd-win-${arch}-${version}-setup.${ext}'
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: true
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  include: windows/installer.nsh
mac:
  artifactName: 'annotamd-mac-${arch}-${version}.${ext}'
  # Native macOS panels use the app bundle's .lproj resources rather than
  # AnnotaMD's renderer translations. Keep every locale supported by the app.
  electronLanguages:
    - de
    - en
    - es
    - fr
    - ja
    - ko
    - pt_BR
    - pt_PT
    - tr
    - zh_CN
    - zh_TW
  # No paid Developer ID is available yet. Explicit ad-hoc signing makes the
  # whole app bundle internally consistent, so Gatekeeper shows the standard
  # unidentified-developer flow instead of reporting the app as damaged.
  identity: '-'
  hardenedRuntime: false
  entitlementsInherit: build/mac/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  icon: static/icon.icns
  notarize: false
  target:
    - dmg
    - zip
dmg:
  artifactName: 'annotamd-mac-${arch}-${version}.${ext}'
  contents:
    - x: 410
      y: 240
      type: 'link'
      path: '/Applications'
    - x: 130
      y: 240
      type: 'file'
linux:
  artifactName: 'annotamd-linux-${version}.${ext}'
  executableName: 'annotamd'
  description: 'A simple and elegant open-source markdown editor that focused on speed and usability.'
  maintainer: 'AnnotaMD Contributors'
  category: 'Office;TextEditor;Utility'
  mimeTypes:
    - 'text/markdown'
  icon: 'static/icon.png'
  desktop:
    entry:
      StartupWMClass: 'annotamd'
      Keywords: 'annotamd;'
  target:
    - AppImage
    - snap
    - deb
    - rpm
    - tar.gz
  fileAssociations:
    - ext: 'md'
      name: 'Markdown'
      description: 'Markdown document'
    - ext: 'markdown'
      name: 'Markdown'
      description: 'Markdown document'
    - ext: 'mmd'
      name: 'Markdown'
      description: 'Markdown document'
    - ext: 'mdown'
      name: 'Markdown'
      description: 'Markdown document'
    - ext: 'mdtxt'
      name: 'Markdown'
      description: 'Markdown document'
    - ext: 'mdtext'
      name: 'Markdown'
      description: 'Markdown document'
